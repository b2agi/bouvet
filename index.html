<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOUVET</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@100;200;300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0A1628;
    --ice: #a8c4d4;
    --ice-dim: rgba(168, 196, 212, 0.35);
    --ice-faint: rgba(168, 196, 212, 0.12);
    --white: rgba(255,255,255,0.82);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--ice);
    font-family: 'Raleway', sans-serif;
    font-weight: 200;
    overflow-x: hidden;
    cursor: default;
  }
